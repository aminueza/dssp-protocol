version: "3.9"

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DSSP_PORT: "8080"
      DSSP_DOC_STORAGE: "minio"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "dssp-documents"
      MINIO_USE_SSL: "false"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v0.1/.well-known/dssp-configuration"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/dssp-documents --ignore-existing;
      mc cp /sample-data/*.pdf local/dssp-documents/;
      echo 'MinIO setup complete';
      "
    volumes:
      - ./sample-data:/sample-data:ro

  scanner:
    build:
      context: ../scanner
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SCANNER_PORT: "8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  agent-demo:
    build:
      context: ./agent-demo
      dockerfile: Dockerfile
    environment:
      GATEWAY_URL: "http://gateway:8080"
      SCANNER_URL: "http://scanner:8081"
    depends_on:
      gateway:
        condition: service_healthy

  audit-viewer:
    build:
      context: ./audit-viewer
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      GATEWAY_URL: "http://gateway:8080"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  minio-data:
