name: CI - Test & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check reference/agent/ reference/scanner/ reference/sidecar/ reference/conformance/ reference/setup/ reference/validator/
      - name: Ruff format check
        run: ruff format --check reference/agent/ reference/scanner/ reference/sidecar/ reference/conformance/ reference/setup/ reference/validator/

  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd reference/validator
          pip install -r requirements.txt
      - name: Validate schemas
        run: |
          cd reference/validator
          python validate.py ../../examples/bank-statement-extraction/

  gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: |
          cd reference/gateway
          go build ./...
      - name: Vet
        run: |
          cd reference/gateway
          go vet ./...
      - name: Test
        run: |
          cd reference/gateway
          go test ./... -v

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install conformance suite
        run: |
          cd reference/conformance
          pip install .
      - name: Run tests
        run: |
          cd reference/conformance
          pytest -v

  scanner:
    name: Scanner Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install scanner
        run: |
          cd reference/scanner
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd reference/scanner
          pytest -v

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint-python, validate-schemas, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validator
        run: pip install jsonschema>=4.20.0
      - name: Run full stack
        run: |
          cd reference
          docker compose up --build -d
          docker compose wait agent
      - name: Capture gateway output
        run: |
          mkdir -p integration-output
          GATEWAY=http://localhost:8080/v0.1

          # Capture manifests
          curl -sf "$GATEWAY/manifests" | python3 -m json.tool > integration-output/manifests-list.json
          MANIFEST_ID=$(python3 -c "import json; d=json.load(open('integration-output/manifests-list.json')); print(d['items'][0]['manifest_id'])")
          curl -sf "$GATEWAY/manifests/$MANIFEST_ID" | python3 -m json.tool > integration-output/manifest.json

          # Capture contracts
          curl -sf "$GATEWAY/contracts" | python3 -m json.tool > integration-output/contracts-list.json
          CONTRACT_ID=$(python3 -c "import json; d=json.load(open('integration-output/contracts-list.json')); print(d['items'][0]['contract_id'])")
          curl -sf "$GATEWAY/contracts/$CONTRACT_ID" | python3 -m json.tool > integration-output/contract.json

          # Capture audit events (extract items array from paginated response)
          curl -sf "$GATEWAY/audit/events" | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['items'], indent=2))" > integration-output/audit-events.json

          echo "=== Captured gateway output ==="
          ls -la integration-output/
      - name: Validate gateway output against schemas
        run: |
          cd reference/validator
          echo "=== Validating manifest ==="
          python validate.py ../../integration-output/manifest.json

          echo "=== Validating contract ==="
          python validate.py ../../integration-output/contract.json

          echo "=== Validating audit events ==="
          python validate.py ../../integration-output/audit-events.json --check-chain
      - name: Validate example files (static)
        run: |
          cd reference/validator
          python validate.py ../../examples/bank-statement-extraction/
      - name: Cleanup
        if: always()
        run: |
          cd reference
          docker compose down -v
          rm -rf ../integration-output
