<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 440" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="g0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="620" height="440" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="620" height="440" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="310" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.5">Document Sovereignty Protocol &amp; Privacy</text>

  <!-- Layer 4 -->
  <rect x="30" y="56" width="560" height="68" rx="8" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="50" y="82" font-size="11" font-weight="600" fill="rgba(255,255,255,0.65)" letter-spacing="1.5">LAYER 4</text>
  <text x="50" y="100" font-size="15" font-weight="700" fill="#fff">Audit Ledger</text>
  <text x="50" y="116" font-size="12" fill="rgba(255,255,255,0.85)">Immutable Merkle chain of every operation</text>

  <!-- Layer 3 -->
  <rect x="30" y="132" width="560" height="68" rx="8" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="50" y="158" font-size="11" font-weight="600" fill="rgba(255,255,255,0.65)" letter-spacing="1.5">LAYER 3</text>
  <text x="50" y="176" font-size="15" font-weight="700" fill="#fff">Result Envelope</text>
  <text x="50" y="192" font-size="12" fill="rgba(255,255,255,0.85)">Structured extractions + attestation proofs</text>

  <!-- Layer 2 -->
  <rect x="30" y="208" width="560" height="68" rx="8" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="50" y="234" font-size="11" font-weight="600" fill="rgba(255,255,255,0.65)" letter-spacing="1.5">LAYER 2</text>
  <text x="50" y="252" font-size="15" font-weight="700" fill="#fff">Processing Contract</text>
  <text x="50" y="268" font-size="12" fill="rgba(255,255,255,0.85)">Who can do what, with which tools, under which rules</text>

  <!-- Layer 1 -->
  <rect x="30" y="284" width="560" height="68" rx="8" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="50" y="310" font-size="11" font-weight="600" fill="rgba(255,255,255,0.65)" letter-spacing="1.5">LAYER 1</text>
  <text x="50" y="328" font-size="15" font-weight="700" fill="#fff">Document Manifest</text>
  <text x="50" y="344" font-size="12" fill="rgba(255,255,255,0.85)">Metadata catalog. Never contains actual content.</text>

  <!-- Layer 0 -->
  <rect x="30" y="360" width="560" height="68" rx="8" fill="url(#g0)" filter="url(#shadow)"/>
  <text x="50" y="386" font-size="11" font-weight="600" fill="rgba(255,255,255,0.65)" letter-spacing="1.5">LAYER 0</text>
  <text x="50" y="404" font-size="15" font-weight="700" fill="#fff">Storage Binding</text>
  <text x="50" y="420" font-size="12" fill="rgba(255,255,255,0.85)">Abstract interface to any S3-compatible backend</text>

  <!-- Right side labels -->
  <text x="570" y="95" text-anchor="end" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">SHA-256</text>
  <text x="570" y="171" text-anchor="end" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">JSON</text>
  <text x="570" y="247" text-anchor="end" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">POLICY</text>
  <text x="570" y="323" text-anchor="end" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">METADATA</text>
  <text x="570" y="399" text-anchor="end" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)">S3 API</text>
</svg>

